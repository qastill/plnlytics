.slogo small{font-size:8px;color:var(--acc);letter-spacing:2px;font-weight:700}
.srole{padding:12px 16px;border-bottom:1px solid var(--bd)}
.srole label{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.srole select{width:100%;background:var(--cd);border:2px solid var(--bd);border-radius:7px;padding:9px 12px;color:var(--tx);outline:none;font-weight:600;transition:border .15s}
.srole select:focus{border-color:var(--prl)}
.srole .rh{font-size:11px;color:var(--prl);margin-top:6px;font-weight:600;line-height:1.4}
.snav{flex:1;padding-top:4px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;color:var(--t2);font-size:13px;font-weight:500}
.ni:hover{background:rgba(43,138,224,.06);color:var(--tx)}.ni.on{background:rgba(43,138,224,.1);border-left-color:var(--pri);color:#fff;font-weight:700}
.ni svg{width:18px;height:18px;fill:currentColor;opacity:.5;flex-shrink:0}.ni.on svg{opacity:1;fill:var(--prl)}

.sai{padding:10px 16px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.sai:hover{background:rgba(43,138,224,.08)}
.sai .ad{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--pri),#1A6DBF);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sai .ad svg{width:14px;height:14px;fill:#fff}
.sai .info{font-size:13px;font-weight:700;color:#fff}

.tb h2{font-size:18px;font-weight:800}.tb .sub{font-size:12px;color:var(--t3);margin-top:1px}
.cw{flex:1;display:flex;overflow:hidden}
.ct{flex:1;overflow-y:auto;padding:12px 16px}

.fbar{display:flex;gap:10px;align-items:center;padding:12px 16px;background:linear-gradient(135deg,rgba(43,138,224,.1),rgba(43,138,224,.03));border:2px solid rgba(43,138,224,.3);border-radius:10px;margin-bottom:12px;position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.3)}

.ai-box .ai-hd{display:flex;align-items:center;gap:6px;margin-bottom:4px}
